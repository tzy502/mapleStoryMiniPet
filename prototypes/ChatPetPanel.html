<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, initial-scale=1.0">
<title>💬 桌宠对话 — ChatPet Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center; justify-content: center;
    min-height: 100vh;
    background: #1a1a22;
    font-family: -apple-system, "SF Pro Display", "SF Pro", "Helvetica Neue", sans-serif;
  }

  /* === Panel: 440x720 === */
  .panel {
    width: 440px; height: 720px;
    background: rgba(30,30,40,0.88);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
    display: flex; flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* === Title Bar === */
  .titlebar {
    display: flex; align-items: center;
    padding: 10px 16px 8px;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .window-btns { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #FF5F57; }
  .dot.yel { background: #FEBC2E; }
  .dot.grn { background: #28C840; }

  .title-text {
    flex: 1; text-align: center;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.3px;
  }
  .title-text span { color: #5E9CFF; }

  .title-right {
    display: flex; gap: 8px;
    align-items: center;
  }
  .title-right .icon-btn {
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 14px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
    transition: all 0.15s;
  }
  .title-right .icon-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* === Pet Avatar Area === */
  .pet-area {
    position: relative;
    flex-shrink: 0;
    height: 160px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* animated grid bg */
  .pet-area::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .pet-sprite {
    position: relative; z-index: 1;
    width: 120px; height: 150px;
    /* animated sprite placeholder — pulsing glow */
    background: radial-gradient(ellipse 60px 80px at 50% 40%, rgba(94,156,255,0.15) 0%, transparent 70%);
    display: flex; align-items: center; justify-content: center;
    animation: petBreathe 2.4s ease-in-out infinite;
  }

  @keyframes petBreathe {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3px) scale(1.02); }
  }

  /* simple stick figure to represent the pet sprite */
  .pet-figure {
    position: relative;
    width: 100px; height: 120px;
  }
  .pet-figure .body {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 50px;
    background: linear-gradient(135deg, #6B8DFF, #5E9CFF);
    border-radius: 12px 12px 6px 6px;
    opacity: 0.6;
  }
  .pet-figure .head {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #7D9DFF, #5E9CFF);
    border-radius: 50%;
    opacity: 0.7;
  }
  .pet-figure .eyes {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .pet-figure .eyes .eye {
    width: 5px; height: 5px;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
  }
  .pet-figure .ears {
    position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 36px;
  }
  .pet-figure .ears .ear {
    width: 10px; height: 14px;
    background: #5E9CFF;
    border-radius: 50% 50% 0 0;
    opacity: 0.4;
  }

  /* === Thinking / Status Bar === */
  .status-bar {
    display: flex; align-items: center;
    padding: 6px 16px;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
    min-height: 28px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.on { background: #34C759; box-shadow: 0 0 6px rgba(52,199,89,0.5); }
  .status-dot.thinking { background: #FF9F0A; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-label {
    font-size: 11px; color: rgba(255,255,255,0.45);
    flex: 1;
  }
  .status-label strong { color: rgba(255,255,255,0.65); font-weight: 500; }

  .status-model {
    font-size: 10px;
    padding: 2px 8px;
    background: rgba(94,156,255,0.15);
    color: #5E9CFF;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* === Chat Messages === */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column;
    gap: 10px;

    /* scrollbar styling */
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.55;
    animation: msgIn 0.25s ease-out;
    word-break: break-word;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: #5E9CFF;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.pet {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
  }

  .msg.pet .pet-name {
    font-size: 10px; color: #5E9CFF; font-weight: 600;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 4px;
  }

  .msg.pet .msg-time {
    font-size: 10px; color: rgba(255,255,255,0.25);
    margin-top: 4px; text-align: right;
  }

  /* typing indicator */
  .typing {
    align-self: flex-start;
    display: flex; gap: 4px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* quick actions strip */
  .quick-actions {
    display: flex; gap: 6px;
    padding: 8px 16px 2px;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .quick-btn {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    background: rgba(94,156,255,0.12);
    border-color: rgba(94,156,255,0.25);
    color: #5E9CFF;
  }

  /* === Input Area === */
  .input-area {
    display: flex; align-items: center;
    padding: 10px 14px;
    gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 9px 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .input-area input::placeholder { color: rgba(255,255,255,0.25); }
  .input-area input:focus {
    border-color: rgba(94,156,255,0.4);
    box-shadow: 0 0 0 2px rgba(94,156,255,0.08);
  }

  .input-area .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #5E9CFF;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .input-area .send-btn:hover { background: #4A8AEE; transform: scale(1.05); }
  .input-area .send-btn:active { transform: scale(0.95); }

  .input-area .mic-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .input-area .mic-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div class="panel">
  <!-- Title Bar -->
  <div class="titlebar">
    <div class="window-btns">
      <div class="dot red"></div>
      <div class="dot yel"></div>
      <div class="dot grn"></div>
    </div>
    <div class="title-text">💬 桌宠对话</div>
    <div class="title-right">
      <button class="icon-btn" title="最小化">─</button>
    </div>
  </div>

  <!-- Pet Avatar -->
  <div class="pet-area">
    <div class="pet-sprite">
      <div class="pet-figure">
        <div class="ears"><div class="ear"></div><div class="ear"></div></div>
        <div class="head"></div>
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="body"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot on"></div>
    <div class="status-label"><strong>路西德</strong> · 已连接 Hermes</div>
    <div class="status-model">gpt-4o</div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-area" id="chatArea">
    <div class="msg pet">
      <div class="pet-name">🐾 路西德</div>
      你好呀胶水！我是你的桌宠助手 🎀<br>想让我帮你做什么？查道具、切怪物，或者聊聊天？
      <div class="msg-time">刚刚</div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('帮我查一下怪物8880150')">🔍 查怪物</button>
    <button class="quick-btn" onclick="sendQuick('切换怪物到拉图斯')">🔄 切怪</button>
    <button class="quick-btn" onclick="sendQuick('今天天气怎么样？')">🌤 天气</button>
    <button class="quick-btn" onclick="sendQuick('讲个笑话')">😂 讲个笑话</button>
    <button class="quick-btn" onclick="sendQuick('今天的运势怎么样？')">🔮 今天运势</button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <input type="text" id="chatInput" placeholder="跟路西德说点什么…" autofocus
           onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="mic-btn" title="语音输入">🎤</button>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const chatInput = document.getElementById('chatInput');

  // === Demo responses ===
  const demos = {
    '怪物': '🔍 查到了！**路西德 (8880150)**\n- 等级: 230\n- 类型: Boss\n- 位置: 阿尔卡那\n要我切换到这只怪物吗？',
    '天气': '🌤 现在是 **2026年7月4日 19:30**\n本地温度约 **28°C**，晴天 ☀️\n冒险岛世界也是好天气呢~',
    '切怪': '🔄 已切换到 **拉图斯 (8220009)**\n精灵图加载中… 完成！现在桌宠是拉图斯了 💪',
    '笑话': '😂 有一个程序猿走进一家酒吧，\n他说："我要一杯啤酒"\n吧台说："好的"\n程序猿说："我还想要一杯啤酒"\n吧台说："好的"\n吧台问："还要别的吗？"\n程序猿说："还要循环吗？"\n吧台：😵',
    '运势': '🔮 **今天的运势**\n✨ 综合运势: ★★★★☆\n💼 工作/学习: 适合处理积压任务\n❤️ 感情: 和朋友聊聊天会有惊喜\n🎮 游戏: 今天打Boss掉率+10%！\n🍀 幸运数字: 7\n祝你今天一切顺利！',
    '默认': '好的胶水！✨\n让我来处理这个任务…\n\n✅ 完成了！还有什么需要吗？',
  };

  function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'pet'}`;
    if (!isUser) {
      div.innerHTML = `<div class="pet-name">🐾 路西德</div>
        ${text.replace(/\n/g, '<br>')}
        <div class="msg-time">刚刚</div>`;
    } else {
      div.textContent = text;
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function getResponse(input) {
    const lower = input.toLowerCase();
    for (const [key, resp] of Object.entries(demos)) {
      if (lower.includes(key)) return resp;
    }
    return demos['默认'];
  }

  function sendMsg() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    addMessage(text, true);
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(getResponse(text));
    }, 600 + Math.random() * 900);
  }

  function sendQuick(text) {
    chatInput.value = text;
    sendMsg();
  }
</script>
</body>
</html>
